services:
  # ----------------------------------------------------------------
  # PostgreSQL — shared database server
  # Two databases are created via init scripts:
  #   - weight_tracker  (app data)
  #   - keycloak        (Keycloak internal data)
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./.docker-volumes/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # Keycloak — identity and access management
  # Uses Postgres as its backend store (production-grade setup).
  # The realm-export.json is imported automatically on first boot
  # via KC_IMPORT so the weight-tracker realm is pre-configured.
  # ----------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    # start-dev with --import-realm auto-imports the realm JSON on
    # first startup if the realm does not yet exist.
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      # Realm config is mounted into the Keycloak import directory.
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ----------------------------------------------------------------
  # Backend — FastAPI application
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host to the Docker service name
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source for hot-reload in dev; remove for production image
      - ./backend:/app/backend
    command: >
      sh -c "
        cd /app &&
        alembic -c backend/alembic.ini upgrade head &&
        uvicorn api:create_app --factory --reload --host 0.0.0.0 --port 8000
      "

  # ----------------------------------------------------------------
  # Frontend — Vite dev server
  # In production, build with `npm run build` and serve via backend
  # or a dedicated nginx container.
  # ----------------------------------------------------------------
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
      - keycloak

line-length = 88
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]
ignore = [
    "E501",
    # B008: FastAPI's Depends() and Query() in function defaults is the
    # standard pattern — not a bug.
    "B008",
]

[lint.isort]
known-first-party = ["db", "analysis", "viz", "api"]
